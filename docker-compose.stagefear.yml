services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - stagefear_mongo:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.backend
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: stage-fear
    depends_on:
      - mongo
    labels:
      traefik.enable: "true"
      traefik.http.routers.stagefear-api.rule: Host(`${STAGEFEAR_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`))
      traefik.http.routers.stagefear-api.entrypoints: websecure
      traefik.http.routers.stagefear-api.tls.certresolver: letsencrypt
      traefik.http.routers.stagefear-api.priority: "100"
      traefik.http.services.stagefear-api.loadbalancer.server.port: "8010"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${STAGEFEAR_HOST}
        NEXT_PUBLIC_WS_URL: wss://${STAGEFEAR_HOST}
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      traefik.enable: "true"
      traefik.http.routers.stagefear-web.rule: Host(`${STAGEFEAR_HOST}`)
      traefik.http.routers.stagefear-web.entrypoints: websecure
      traefik.http.routers.stagefear-web.tls.certresolver: letsencrypt
      traefik.http.routers.stagefear-web.priority: "1"
      traefik.http.services.stagefear-web.loadbalancer.server.port: "3005"

volumes:
  stagefear_mongo:
